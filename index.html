<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Học Tập HTML</title>
</head>
<body>

  <!-- (header) -->
  <header>
    <p>(header)</p>
    <p>website học tập html</p>
    <p>logo+tiêu đề bài học</p>
  </header>

  <hr>

  <!-- (nav) -->
  <nav>
    <p>(nav)</p>
    <p>trang chủ | bài học | bài tập | liên hệ</p>
  </nav>

  <hr>

  <!-- (main) -->
  <main>
    <p>(main)</p>

    <!-- (section) -->
    <section>
      <p>(section)</p>
      <p>bài 1 : cấu trúc tài liệu html</p>
      <p>nội dung kiến thức:</p>
    </section>

    <br>

    <!-- (form) -->
    <form action="#" method="POST">
      <p>(form)</p>
      
      <div>
        <label for="hoten">họ và tên : </label>
        <input type="text" id="hoten" name="txt_hoten">
      </div>
      
      <div>
        <label for="email">email: </label>
        <input type="email" id="email" name="txt_email">
      </div>
      
      <div>
        <label for="baihoc">bài học </label>
        <input type="text" id="baihoc" name="txt_baihoc">
      </div>
      
      <br>
      
      <div>
        <button type="submit">[gửi bài]</button>
      </div>
    </form>

  </main>

  <hr>

  <!-- footer -->
  <footer>
    <ul>
      <li>footer</li>
    </ul>
    
    <p>© 2026 Website Học Tập HTML</p>
    <p>Thông tin liên hệ</p>
  </footer>

</body>
</html>
